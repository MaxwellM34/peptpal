version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: peptpal
      POSTGRES_PASSWORD: peptpal
      POSTGRES_DB: peptpal
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U peptpal']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgres://peptpal:peptpal@postgres:5432/peptpal
      ADMIN_SECRET_TOKEN: ${ADMIN_SECRET_TOKEN:-changeme}
      ALLOWED_ORIGINS: 'http://localhost:3000,http://localhost:8081,https://peptpal.com'
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
